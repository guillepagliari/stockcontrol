<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>StockControl PSANC</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --navy:#0f172a;--navy2:#1e293b;--navy3:#334155;
  --accent:#0ea5e9;--accent2:#0284c7;
  --success:#10b981;--warn:#f59e0b;--danger:#ef4444;
  --text:#f8fafc;--text2:#94a3b8;--text3:#64748b;
  --border:#334155;--card:#1e293b;--surface:#0f172a;
}
html,body{min-height:100%;background:var(--surface);color:var(--text);font-family:'Segoe UI',system-ui,sans-serif;font-size:16px}
.app{display:flex;flex-direction:column;min-height:100vh}

.login-screen{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:1.5rem}
.login-box{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:2rem;width:100%;max-width:420px}
.login-logo{text-align:center;margin-bottom:1.5rem}
.login-logo h1{font-size:20px;font-weight:600;letter-spacing:-.5px}
.login-logo p{font-size:13px;color:var(--text2);margin-top:4px}
.badge-logo{background:linear-gradient(135deg,#0ea5e9,#0284c7);width:52px;height:52px;border-radius:14px;display:inline-flex;align-items:center;justify-content:center;margin-bottom:10px;box-shadow:0 4px 14px #0ea5e940}
.user-grid{display:grid;gap:8px;margin-bottom:1.25rem}
.user-card{background:var(--navy);border:1px solid var(--border);border-radius:10px;padding:12px 14px;cursor:pointer;display:flex;align-items:center;gap:12px;transition:border-color .15s,background .15s}
.user-card:hover,.user-card.selected{border-color:var(--accent);background:#0ea5e910}
.user-avatar{width:38px;height:38px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:600;flex-shrink:0}
.user-info p{font-size:14px;font-weight:500;line-height:1.2}
.user-info span{font-size:12px;color:var(--text2)}
.role-badge{margin-left:auto;font-size:11px;padding:3px 8px;border-radius:20px;font-weight:500;white-space:nowrap}
.role-admin{background:#0ea5e918;color:var(--accent);border:1px solid #0ea5e940}
.role-user{background:#10b98118;color:var(--success);border:1px solid #10b98140}
.btn-primary{width:100%;padding:12px;background:linear-gradient(135deg,#0ea5e9,#0284c7);color:#fff;border:none;border-radius:10px;font-size:15px;font-weight:500;cursor:pointer;box-shadow:0 2px 10px #0ea5e930}
.btn-primary:active{opacity:.88}
.btn-primary:disabled{opacity:.35;cursor:not-allowed;box-shadow:none}

.topbar{background:var(--card);border-bottom:1px solid var(--border);padding:0 1rem;height:52px;display:flex;align-items:center;gap:10px;position:sticky;top:0;z-index:100}
.topbar-brand{font-size:14px;font-weight:600;display:flex;align-items:center;gap:8px;flex:1;min-width:0}
.topbar-brand .dot{width:7px;height:7px;border-radius:50%;background:var(--accent);flex-shrink:0;box-shadow:0 0 6px var(--accent)}
.topbar-name{font-size:12px;color:var(--text2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:140px}
.btn-logout{background:transparent;border:1px solid var(--border);color:var(--text2);padding:6px 10px;border-radius:8px;font-size:12px;cursor:pointer;white-space:nowrap;display:flex;align-items:center;gap:5px}
.btn-logout:active{opacity:.7}

.layout{display:flex;flex:1;min-height:0}
.sidebar{width:192px;background:var(--card);border-right:1px solid var(--border);padding:.75rem 0;flex-shrink:0}
.nav-item{display:flex;align-items:center;gap:9px;padding:9px 14px;font-size:13px;color:var(--text3);cursor:pointer;border-left:2px solid transparent;transition:all .15s}
.nav-item:hover{color:var(--text2);background:#ffffff06}
.nav-item.active{color:var(--accent);border-left-color:var(--accent);background:#0ea5e910}
.nav-item svg{width:16px;height:16px;stroke:currentColor;fill:none;stroke-width:1.7;stroke-linecap:round;stroke-linejoin:round;flex-shrink:0}
.nav-section{font-size:9px;font-weight:600;letter-spacing:1.2px;color:var(--text3);padding:8px 14px 3px;margin-top:4px;text-transform:uppercase;opacity:.7}
.main{flex:1;padding:1.25rem;overflow:auto}

.mobile-nav{display:none;position:fixed;bottom:0;left:0;right:0;background:var(--card);border-top:1px solid var(--border);z-index:100;padding:0 0 env(safe-area-inset-bottom,0)}
.mobile-nav-inner{display:flex;justify-content:space-around}
.mnav-item{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:8px 4px;cursor:pointer;color:var(--text3);font-size:9px;gap:3px;min-height:50px}
.mnav-item svg{width:20px;height:20px;stroke:currentColor;fill:none;stroke-width:1.7;stroke-linecap:round;stroke-linejoin:round}
.mnav-item.active{color:var(--accent)}
.main-mobile-pad{padding-bottom:calc(62px + env(safe-area-inset-bottom,0))}

.stats-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-bottom:1.25rem}
@media(min-width:600px){.stats-grid{grid-template-columns:repeat(4,1fr)}}
.stat-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:13px 15px;position:relative;overflow:hidden}
.stat-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--accent-c,#0ea5e9),transparent)}
.stat-label{font-size:11px;color:var(--text3);margin-bottom:5px;display:flex;align-items:center;gap:5px}
.stat-label svg{width:13px;height:13px;stroke:currentColor;fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}
.stat-value{font-size:24px;font-weight:600;letter-spacing:-.5px}
.stat-sub{font-size:10px;color:var(--text3);margin-top:2px}

.section-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:.9rem;flex-wrap:wrap;gap:8px}
.section-title{font-size:15px;font-weight:500}

/* ── refined small buttons ── */
.btn-sm{padding:6px 12px;border-radius:8px;font-size:12px;font-weight:500;cursor:pointer;display:inline-flex;align-items:center;gap:5px;border:1px solid var(--border);background:var(--card);color:var(--text2);transition:all .12s}
.btn-sm:active{opacity:.75}
.btn-sm.accent{background:var(--accent);border-color:var(--accent);color:#fff}
.btn-sm.success{background:var(--success);border-color:var(--success);color:#fff}
.btn-sm svg{width:13px;height:13px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}

/* ── icon action buttons — refined & smaller ── */
.action-btns{display:flex;gap:3px}
.icon-btn{background:transparent;border:1px solid transparent;color:var(--text3);cursor:pointer;padding:5px;border-radius:6px;display:inline-flex;align-items:center;justify-content:center;transition:all .12s;min-width:28px;min-height:28px}
.icon-btn:hover{background:var(--navy);border-color:var(--border);color:var(--text)}
.icon-btn:active{opacity:.7}
.icon-btn.del:hover{background:#ef444412;border-color:#ef444440;color:var(--danger)}
.icon-btn svg{width:13px;height:13px;stroke:currentColor;fill:none;stroke-width:1.7;stroke-linecap:round;stroke-linejoin:round}

.table-wrap{background:var(--card);border:1px solid var(--border);border-radius:12px;overflow:hidden}
.table-toolbar{padding:10px 14px;border-bottom:1px solid var(--border);display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.search-box{flex:1;min-width:120px;position:relative}
.search-box svg{position:absolute;left:9px;top:50%;transform:translateY(-50%);width:13px;height:13px;stroke:var(--text3);fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;pointer-events:none}
.search-box input{width:100%;background:var(--navy);border:1px solid var(--border);color:var(--text);border-radius:8px;padding:7px 10px 7px 29px;font-size:13px;outline:none}
.search-box input:focus{border-color:var(--accent)}
.select-filter{background:var(--navy);border:1px solid var(--border);color:var(--text);border-radius:8px;padding:7px 10px;font-size:13px;outline:none}
.tbl-scroll{overflow-x:auto;-webkit-overflow-scrolling:touch}
table{width:100%;border-collapse:collapse;min-width:400px}
th{font-size:10px;font-weight:500;color:var(--text3);text-transform:uppercase;letter-spacing:.6px;padding:9px 14px;text-align:left;border-bottom:1px solid var(--border);white-space:nowrap}
td{padding:10px 14px;font-size:13px;border-bottom:1px solid var(--border);vertical-align:middle}
tr:last-child td{border-bottom:none}
tr:hover td{background:#ffffff04}

.pill{display:inline-block;padding:2px 8px;border-radius:20px;font-size:11px;font-weight:500;white-space:nowrap}
.pill-in{background:#10b98114;color:#34d399;border:1px solid #10b98130}
.pill-out{background:#f59e0b14;color:#fbbf24;border:1px solid #f59e0b30}
.pill-epp{background:#0ea5e914;color:#38bdf8;border:1px solid #0ea5e930}
.pill-mat{background:#8b5cf614;color:#a78bfa;border:1px solid #8b5cf630}
.pill-low{background:#ef444414;color:#f87171;border:1px solid #ef444430}
.pill-ok{background:#10b98114;color:#34d399;border:1px solid #10b98130}

.chips{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:1rem}
.chip{padding:5px 13px;border-radius:20px;font-size:12px;font-weight:500;cursor:pointer;border:1px solid var(--border);background:transparent;color:var(--text3);transition:all .12s}
.chip.active,.chip:hover{border-color:var(--accent);color:var(--accent);background:#0ea5e910}

.overlay{position:fixed;inset:0;background:#00000090;z-index:200;display:flex;align-items:center;justify-content:center;padding:1rem;backdrop-filter:blur(2px)}
.panel{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:1.5rem;width:100%;max-width:460px;max-height:90vh;overflow-y:auto;box-shadow:0 20px 60px #00000060}
.panel-title{font-size:14px;font-weight:600;margin-bottom:1.25rem;display:flex;align-items:center;justify-content:space-between;color:var(--text)}
.form-row{margin-bottom:12px}
.form-row label{display:block;font-size:10px;color:var(--text3);margin-bottom:5px;font-weight:500;letter-spacing:.5px;text-transform:uppercase}
.form-row input,.form-row select{width:100%;background:var(--navy);border:1px solid var(--border);color:var(--text);border-radius:8px;padding:10px 12px;font-size:14px;outline:none;font-family:inherit}
.form-row input:focus,.form-row select:focus{border-color:var(--accent)}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.form-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:1.25rem}

.reg-wrap{display:grid;grid-template-columns:1fr 1fr;gap:1.25rem;align-items:start}
@media(max-width:640px){.reg-wrap{grid-template-columns:1fr}}
.reg-card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:1.25rem}
.reg-field{margin-bottom:1rem}
.reg-field label{display:block;font-size:10px;font-weight:600;color:var(--text3);letter-spacing:.6px;text-transform:uppercase;margin-bottom:6px}
.reg-field input,.reg-field select{width:100%;background:var(--navy);border:1px solid var(--border);color:var(--text);border-radius:10px;padding:12px 14px;font-size:16px;outline:none;font-family:inherit;transition:border-color .15s}
.reg-field input:focus,.reg-field select:focus{border-color:var(--accent)}
.prod-hint{margin-top:6px;padding:8px 12px;border-radius:8px;font-size:12px;display:none}
.prod-hint.found{display:block;background:#10b98110;border:1px solid #10b98130;color:#34d399}
.prod-hint.notfound{display:block;background:#ef444410;border:1px solid #ef444430;color:#f87171}
.type-toggle{display:flex;gap:6px;margin-bottom:1rem}
.type-btn{flex:1;padding:10px 8px;border-radius:10px;font-size:12px;font-weight:500;cursor:pointer;border:1px solid var(--border);background:var(--navy);color:var(--text3);transition:all .15s;text-align:center}
.type-btn.active-in{border-color:#10b98140;background:#10b98110;color:#34d399}
.type-btn.active-out{border-color:#f59e0b40;background:#f59e0b10;color:#fbbf24}
.prod-list{background:var(--navy);border:1px solid var(--border);border-radius:10px;overflow:hidden;max-height:420px;overflow-y:auto}
.prod-list-item{padding:9px 13px;font-size:13px;cursor:pointer;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;transition:background .1s}
.prod-list-item:last-child{border-bottom:none}
.prod-list-item:active,.prod-list-item:hover{background:#ffffff06}

/* QR */
.qr-btn{width:100%;padding:12px;border-radius:10px;border:1px dashed #0ea5e940;background:#0ea5e908;color:var(--accent);font-size:13px;font-weight:500;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;margin-top:.75rem;transition:background .15s}
.qr-btn svg{width:16px;height:16px;stroke:currentColor;fill:none;stroke-width:1.7;stroke-linecap:round;stroke-linejoin:round}
.qr-btn:hover,.qr-btn:active{background:#0ea5e915}
.scanner-modal{position:fixed;inset:0;background:#000;z-index:300;display:flex;flex-direction:column}
.scanner-header{padding:.75rem 1rem;display:flex;align-items:center;justify-content:space-between;background:linear-gradient(#000a,transparent);position:absolute;top:0;left:0;right:0;z-index:1}
.scanner-header h2{color:#fff;font-size:14px;font-weight:500}
.scanner-close{background:#ffffff18;border:1px solid #ffffff30;color:#fff;padding:6px 14px;border-radius:8px;font-size:12px;cursor:pointer}
#qrVideo{width:100%;height:100%;object-fit:cover;display:block}
.scanner-overlay{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;pointer-events:none}
.scanner-frame{width:220px;height:220px;border:2px solid var(--accent);border-radius:14px;box-shadow:0 0 0 9999px rgba(0,0,0,.6)}
.scanner-corners::before,.scanner-corners::after{content:'';position:absolute;width:28px;height:28px;border-color:var(--accent);border-style:solid;border-radius:3px}
.scanner-corners::before{top:-2px;left:-2px;border-width:3px 0 0 3px}
.scanner-corners::after{bottom:-2px;right:-2px;border-width:0 3px 3px 0}
.scanner-hint{position:absolute;bottom:2.5rem;left:0;right:0;text-align:center;color:#ffffff90;font-size:12px}
.scanner-status{position:absolute;bottom:4.5rem;left:0;right:0;text-align:center;color:var(--accent);font-size:12px;font-weight:500}

.user-row-avatar{width:30px;height:30px;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;flex-shrink:0}

.export-grid{display:grid;grid-template-columns:1fr 1fr;gap:1rem;margin-bottom:1.25rem}
@media(max-width:500px){.export-grid{grid-template-columns:1fr}}

.toast{position:fixed;bottom:calc(68px + env(safe-area-inset-bottom,0));right:14px;background:var(--navy2);border:1px solid var(--border);border-radius:10px;padding:10px 14px;font-size:13px;z-index:999;display:flex;align-items:center;gap:8px;animation:toastIn .2s ease;max-width:260px;box-shadow:0 4px 20px #0008}
@media(min-width:641px){.toast{bottom:18px}}
.toast svg{width:15px;height:15px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;flex-shrink:0}
.toast.ok svg{color:var(--success)}
.toast.err svg{color:var(--danger)}
@keyframes toastIn{from{transform:translateY(12px);opacity:0}to{transform:translateY(0);opacity:1}}
.empty{padding:2rem;text-align:center;color:var(--text3);font-size:13px}
.empty svg{width:24px;height:24px;stroke:currentColor;fill:none;stroke-width:1.5;stroke-linecap:round;margin-bottom:6px;display:block;margin-inline:auto;opacity:.5}

@media(max-width:640px){
  .sidebar{display:none}
  .mobile-nav{display:block}
  .main{padding:1rem;padding-bottom:0}
  .main-mobile-pad{padding-bottom:calc(62px + env(safe-area-inset-bottom,0))}
  .reg-wrap{grid-template-columns:1fr}
  .dashboard-grid{grid-template-columns:1fr!important}
  table{min-width:360px}
}
/* Product photos */
.prod-thumb{width:36px;height:36px;border-radius:6px;object-fit:cover;border:1px solid var(--border);flex-shrink:0}
.prod-thumb-ph{width:36px;height:36px;border-radius:6px;border:1px solid var(--border);background:var(--navy);display:flex;align-items:center;justify-content:center;flex-shrink:0;color:var(--text3)}
.prod-thumb-ph svg{width:14px;height:14px;stroke:currentColor;fill:none;stroke-width:1.5;stroke-linecap:round;stroke-linejoin:round}
.photo-drop{border:2px dashed var(--border);border-radius:10px;padding:1rem;text-align:center;cursor:pointer;transition:border-color .15s,background .15s;position:relative;margin-top:4px}
.photo-drop:hover{border-color:var(--accent);background:#0ea5e908}
.photo-drop input[type=file]{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%}
.photo-preview-img{width:100%;max-height:150px;object-fit:contain;border-radius:8px;margin-top:8px;border:1px solid var(--border)}
.reg-prod-img{width:44px;height:44px;border-radius:8px;object-fit:cover;border:1px solid var(--border);flex-shrink:0}
.reg-prod-img-ph{width:44px;height:44px;border-radius:8px;border:1px solid var(--border);background:var(--navy);display:flex;align-items:center;justify-content:center;flex-shrink:0;color:var(--text3)}
.reg-prod-img-ph svg{width:18px;height:18px;stroke:currentColor;fill:none;stroke-width:1.5;stroke-linecap:round;stroke-linejoin:round}
</style>
</head>
<body>
<div class="app" id="app">

<div id="loadingScreen" style="position:fixed;inset:0;background:var(--surface);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:999;gap:16px">
  <style>@keyframes spcSpin{to{transform:rotate(360deg)}}</style>
  <div style="width:36px;height:36px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spcSpin .7s linear infinite"></div>
  <p style="font-size:13px;color:var(--text2)">Conectando con la base de datos...</p>
</div>

<div class="login-screen" id="loginScreen" style="display:none">
  <div class="login-box">
    <div class="login-logo">
      <div class="badge-logo">
        <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M21 16V8a2 2 0 00-1-1.73l-7-4a2 2 0 00-2 0l-7 4A2 2 0 003 8v8a2 2 0 001 1.73l7 4a2 2 0 002 0l7-4A2 2 0 0021 16z"/><polyline points="3.27 6.96 12 12.01 20.73 6.96"/><line x1="12" y1="22.08" x2="12" y2="12"/></svg>
      </div>
      <h1>StockControl PSANC</h1>
      <p>Gestión de materiales y EPP</p>
    </div>
    <p style="font-size:12px;color:var(--text3);margin-bottom:10px">Seleccioná tu usuario:</p>
    <div class="user-grid" id="userGrid"></div>
    <div class="form-row" id="pwdRow" style="display:none">
      <label>Contraseña</label>
      <input type="password" id="loginPwd" placeholder="••••" inputmode="numeric" autocomplete="off" onkeydown="if(event.key==='Enter')doLogin()" oninput="document.getElementById('loginError').style.display='none'">
      <div id="loginError" style="display:none;color:#f87171;font-size:12px;margin-top:6px">Contraseña incorrecta</div>
    </div>
    <button class="btn-primary" id="loginBtn" disabled onclick="doLogin()">Ingresar</button>
  </div>
</div>

<div style="display:none;flex-direction:column;flex:1" id="mainApp">
  <div class="topbar">
    <div class="topbar-brand"><div class="dot"></div><span>StockControl PSANC</span></div>
    <span class="topbar-name" id="topbarUser"></span>
    <button class="btn-logout" onclick="logout()">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
      Salir
    </button>
  </div>
  <div class="layout">
    <div class="sidebar" id="sidebar"></div>
    <div class="main main-mobile-pad" id="mainContent"></div>
  </div>
  <nav class="mobile-nav" id="mobileNav"></nav>
</div>

</div>

<!-- QR Scanner -->
<div class="scanner-modal" id="scannerModal" style="display:none">
  <div class="scanner-header">
    <h2>Escanear código</h2>
    <button class="scanner-close" onclick="closeScanner()">✕ Cerrar</button>
  </div>
  <video id="qrVideo" playsinline autoplay muted></video>
  <div class="scanner-overlay">
    <div class="scanner-frame" style="position:relative">
      <div class="scanner-corners"></div>
    </div>
  </div>
  <div class="scanner-status" id="scannerStatus"></div>
  <div class="scanner-hint">Apuntá la cámara al código</div>
</div>

<div id="overlayContainer"></div>
<div id="toastContainer"></div>

<script>
// ── SVG ICONS (inline, refined 1.7px stroke, 13–16px) ──────────

let DB={users:[],products:[],movements:[],categories:[],catIds:{}};
let currentUser=null,currentView='dashboard',regType='Salida',regScanned='';

async function loadAll(){
  try{
    const[users,products,movements,categories]=await Promise.all([
      sbGet('app_users','order=name'),
      sbGet('products','order=code'),
      sbGet('movements','order=date.desc,created_at.desc'),
      sbGet('categories','order=name'),
    ]);
    DB.users=users;
    DB.products=products.map(p=>({...p,minStock:p.min_stock}));
    DB.movements=movements.map(m=>({...m,productId:m.product_id,productName:m.product_name,code:m.product_code,userId:m.user_id,userName:m.user_name}));
    DB.categories=categories.map(c=>c.name);
    DB.catIds={};categories.forEach(c=>{DB.catIds[c.name]=c.id;});
    document.getElementById('loadingScreen').style.display='none';
    document.getElementById('loginScreen').style.display='flex';
    renderLogin();
  }catch(e){
    document.getElementById('loadingScreen').innerHTML=`<div style="text-align:center;padding:2rem;color:#f87171;max-width:320px">
      <p style="font-size:15px;font-weight:500;margin-bottom:8px">Error de conexión</p>
      <p style="font-size:12px;color:var(--text2);margin-bottom:16px;word-break:break-word">${e.message}</p>
      <button onclick="location.reload()" class="btn-primary" style="width:auto;padding:10px 24px">Reintentar</button></div>`;
  }
}

function toast(msg,type='ok'){
  const t=document.createElement('div');t.className='toast '+type;
  t.innerHTML=(type==='ok'?I.check:I.alert)+msg;
  document.getElementById('toastContainer').appendChild(t);
  setTimeout(()=>t.remove(),3000);
}
function closeOverlay(){document.getElementById('overlayContainer').innerHTML='';pendingPhotoFile=null;}
// ── LOGIN ─────────────────────────────────────────────────────────
function renderLogin(){
  document.getElementById('userGrid').innerHTML=DB.users.map(u=>`
    <div class="user-card" onclick="selectUser('${u.id}')" id="uc${u.id}">
      <div class="user-avatar" style="background:${u.color}22;color:${u.color}">${u.initials}</div>
      <div class="user-info"><p>${u.name}</p><span>${u.role==='admin'?'Administrador':'Operador'}</span></div>
      <span class="role-badge ${u.role==='admin'?'role-admin':'role-user'}">${u.role==='admin'?'Admin':'Usuario'}</span>
    </div>`).join('');
}
function selectUser(id){
  currentUser=DB.users.find(u=>u.id===id);
  document.querySelectorAll('.user-card').forEach(c=>c.classList.remove('selected'));
  document.getElementById('uc'+id).classList.add('selected');
  document.getElementById('loginBtn').disabled=false;
  document.getElementById('pwdRow').style.display='block';
  document.getElementById('loginError').style.display='none';
  const pwd=document.getElementById('loginPwd');pwd.value='';setTimeout(()=>pwd.focus(),50);
}
function doLogin(){
  if(!currentUser)return;
  if(document.getElementById('loginPwd').value!==currentUser.password){
    document.getElementById('loginError').style.display='block';return;
  }
  document.getElementById('loginScreen').style.display='none';
  document.getElementById('mainApp').style.display='flex';
  document.getElementById('topbarUser').textContent=currentUser.name+(currentUser.role==='admin'?' · Admin':'');
  renderSidebar();renderMobileNav();navigate('dashboard');
}
function logout(){
  currentUser=null;
  document.getElementById('mainApp').style.display='none';
  document.getElementById('loginScreen').style.display='flex';
  document.querySelectorAll('.user-card').forEach(c=>c.classList.remove('selected'));
  document.getElementById('loginBtn').disabled=true;
  document.getElementById('pwdRow').style.display='none';
  currentView='dashboard';regScanned='';regType='Salida';
  renderLogin();
}

// ── NAV ───────────────────────────────────────────────────────────
function navItems(){
  const a=currentUser.role==='admin';
  return[
    {id:'dashboard',icon:I.nav_dashboard,label:'Dashboard'},
    {id:'movements',icon:I.nav_movements,label:'Movimientos'},
    {id:'register',icon:I.nav_register,label:'Registrar'},
    ...(a?[
      {id:'products',icon:I.nav_products,label:'Productos'},
      {id:'users',icon:I.nav_users,label:'Usuarios'},
      {id:'export',icon:I.nav_export,label:'Exportar'},
    ]:[]),
  ];
}
function renderSidebar(){
  const a=currentUser.role==='admin';let html='';
  navItems().forEach(item=>{
    if(a&&item.id==='products')html+=`<div class="nav-section">Admin</div>`;
    html+=`<div class="nav-item ${currentView===item.id?'active':''}" onclick="navigate('${item.id}')">${item.icon}<span>${item.label}</span></div>`;
  });
  document.getElementById('sidebar').innerHTML=html;
}
function renderMobileNav(){
  document.getElementById('mobileNav').innerHTML=`<div class="mobile-nav-inner">${
    navItems().map(it=>`<div class="mnav-item ${currentView===it.id?'active':''}" onclick="navigate('${it.id}')">${it.icon}<span>${it.label}</span></div>`).join('')
  }</div>`;
}
function navigate(view){
  const restricted=['products','users','export'];
  if(currentUser.role!=='admin'&&restricted.includes(view))view='dashboard';
  currentView=view;renderSidebar();renderMobileNav();
  const mc=document.getElementById('mainContent');mc.scrollTop=0;
  if(view==='dashboard')renderDashboard(mc);
  else if(view==='movements')renderMovements(mc);
  else if(view==='register')renderRegister(mc);
  else if(view==='products')renderProducts(mc);
  else if(view==='users')renderUsers(mc);
  else if(view==='export')renderExport(mc);
}

function renderDashboard(el){

  const td=new Date().toISOString().slice(0,10);
  const todayMovs=DB.movements.filter(m=>m.date===td).length;
  const eppByUser={};
  DB.movements.filter(m=>m.type==='Salida'&&DB.products.find(p=>p.id===m.productId&&p.category==='EPP')).forEach(m=>{
    if(!eppByUser[m.userId])eppByUser[m.userId]={name:m.userName,total:0,items:{}};
    eppByUser[m.userId].total+=m.qty;
    eppByUser[m.userId].items[m.productName]=(eppByUser[m.userId].items[m.productName]||0)+m.qty;
  });
  DB.users.forEach(u=>{if(!eppByUser[u.id])eppByUser[u.id]={name:u.name,total:0,items:{}};});
  const eppList=Object.entries(eppByUser).sort((a,b)=>b[1].total-a[1].total);
  const maxEPP=Math.max(...eppList.map(([,v])=>v.total),1);
  const catC={};
  DB.movements.filter(m=>m.type==='Salida').forEach(m=>{
    const p=DB.products.find(pr=>pr.id===m.productId);

    </div>
    <div class="section-header"><div class="section-title" style="font-size:13px">Ranking categorías — consumo</div></div>
    <div class="table-wrap" style="margin-bottom:1rem"><div class="tbl-scroll"><table>
      <thead><tr><th>#</th><th>Categoría</th><th>Total</th><th style="min-width:140px">Barra</th></tr></thead><tbody>
      ${catRank.length?catRank.map(([cat,total],i)=>{const c=catColor(cat),pct=Math.round((total/maxCat)*100);
        return`<tr><td style="color:var(--text3);font-weight:600">${i+1}</td>
          <td><span class="pill" style="${catPillStyle(cat)}">${cat}</span></td>
          <td><span style="font-size:15px;font-weight:600;color:${c}">${total}</span> <span style="font-size:11px;color:var(--text3)">u.</span></td>
          <td><div style="background:var(--navy);border-radius:4px;height:8px;overflow:hidden">

      }).join(''):`<tr><td colspan="4" class="empty">${I.inbox}Sin salidas registradas</td></tr>`}
      </tbody></table></div></div>

async function saveMovement(id){
  const m=DB.movements.find(x=>x.id===id);if(!m)return;
  const date=document.getElementById('fm-date').value;
  const prodId=document.getElementById('fm-prod').value;
  const type=document.getElementById('fm-type').value;
  const qty=parseInt(document.getElementById('fm-qty').value)||1;
  const userId=document.getElementById('fm-user').value;
  const u=DB.users.find(x=>x.id===userId);
  const p=DB.products.find(x=>x.id===prodId);
  if(!date||!p||qty<1){toast('Completá todos los campos','err');return;}
  try{
    const oldP=DB.products.find(x=>x.id===m.productId);
    if(oldP){
      const ns=m.type==='Entrada'?oldP.stock-m.qty:oldP.stock+m.qty;
      await sbPatch('products',oldP.id,{stock:ns});oldP.stock=ns;
    }
    const ns2=type==='Entrada'?p.stock+qty:p.stock-qty;
    await sbPatch('products',p.id,{stock:ns2});p.stock=ns2;
    await sbPatch('movements',id,{date,product_id:p.id,product_name:p.name,product_code:p.code,type,qty,user_id:userId,user_name:u?.name||m.userName});
    Object.assign(m,{date,productId:p.id,productName:p.name,code:p.code,type,qty,userId,userName:u?.name||m.userName});
    closeOverlay();toast('Movimiento actualizado');navigate('movements');
  }catch(e){toast('Error: '+e.message,'err');}
}
async function deleteMovement(id){
  if(!confirm('¿Eliminar este movimiento?'))return;
  const m=DB.movements.find(x=>x.id===id);
  try{
    if(m){const p=DB.products.find(x=>x.id===m.productId);
      if(p){const ns=m.type==='Entrada'?p.stock-m.qty:p.stock+m.qty;await sbPatch('products',p.id,{stock:ns});p.stock=ns;}
    }
    await sbDel('movements',id);
    DB.movements=DB.movements.filter(x=>x.id!==id);
    toast('Movimiento eliminado');navigate('movements');
  }catch(e){toast('Error: '+e.message,'err');}
}

async function submitMovement(){
  const code=(document.getElementById('regCode')?.value||'').trim();
  const qty=parseInt(document.getElementById('regQty')?.value)||1;
  const desc=document.getElementById('regDesc')?.value||'';
  const type=currentUser.role==='admin'?regType:'Salida';
  const t=code.toLowerCase();
  const p=DB.products.find(pr=>pr.code.toLowerCase()===t||pr.name.toLowerCase()===t);
  if(!p){toast('Ingresá un código o nombre válido','err');return;}
  if(qty<1){toast('Cantidad inválida','err');return;}
  if(type==='Salida'&&p.stock<qty){toast(`Stock insuficiente (disponible: ${p.stock} ${p.unit})`,'err');return;}
  try{
    const ns=type==='Entrada'?p.stock+qty:p.stock-qty;
    const body={date:new Date().toISOString().slice(0,10),type,product_id:p.id,product_name:p.name,product_code:p.code,qty,user_id:currentUser.id,user_name:currentUser.name,description:desc};
    const[newMov]=await sbPost('movements',body);
    await sbPatch('products',p.id,{stock:ns});p.stock=ns;
    DB.movements.unshift({...newMov,productId:newMov.product_id,productName:newMov.product_name,code:newMov.product_code,userId:newMov.user_id,userName:newMov.user_name});

// ── SCANNER (corregido — canvas polling) ─────────────────────────
let scanStream=null,scanTimer=null;

async function openScanner(){
  const modal=document.getElementById('scannerModal');
  modal.style.display='flex';
  document.getElementById('scannerStatus').textContent='Iniciando cámara...';
  const video=document.getElementById('qrVideo');
  if(scanStream){scanStream.getTracks().forEach(t=>t.stop());scanStream=null;}
  if(scanTimer){clearInterval(scanTimer);scanTimer=null;}
  try{
    scanStream=await navigator.mediaDevices.getUserMedia({video:{facingMode:{ideal:'environment'},width:{ideal:1280},height:{ideal:720}}});
    video.srcObject=scanStream;
    await new Promise(res=>{video.onloadedmetadata=()=>{video.play();res();}});
    document.getElementById('scannerStatus').textContent='Apuntá al código...';
    // wait for ZXing then start polling
    waitZXing(video,0);
  }catch(err){
    modal.style.display='none';
    toast(err.name==='NotAllowedError'?'Permiso de cámara denegado':'No se pudo abrir la cámara','err');
  }
}
function waitZXing(video,attempts){
  if(typeof ZXing!=='undefined'){startScanLoop(video);return;}
  if(attempts>20){document.getElementById('scannerStatus').textContent='Ingresá el código manualmente';return;}
  setTimeout(()=>waitZXing(video,attempts+1),300);
}
function startScanLoop(video){
  const canvas=document.createElement('canvas');
  const ctx=canvas.getContext('2d');
  const reader=new ZXing.BrowserMultiFormatReader();
  scanTimer=setInterval(async()=>{
    if(!scanStream||video.readyState<2)return;
    canvas.width=video.videoWidth;canvas.height=video.videoHeight;
    ctx.drawImage(video,0,0);
    try{
      const lum=new ZXing.HTMLCanvasElementLuminanceSource(canvas);
      const bmp=new ZXing.BinaryBitmap(new ZXing.HybridBinarizer(lum));
      const result=reader.decodeBitmap(bmp);
      if(result){
        clearInterval(scanTimer);scanTimer=null;
        closeScanner();fillRegCode(result.getText());
        toast('Código escaneado: '+result.getText());
      }
    }catch(e){/* no code found this frame */}
  },200);
}
function closeScanner(){
  document.getElementById('scannerModal').style.display='none';
  if(scanStream){scanStream.getTracks().forEach(t=>t.stop());scanStream=null;}
  if(scanTimer){clearInterval(scanTimer);scanTimer=null;}
}
(function(){const s=document.createElement('script');s.src='https://unpkg.com/@zxing/library@0.18.6/umd/index.min.js';s.async=true;document.head.appendChild(s);})();

function prodHeaderCells(){

  return cols.map(c=>{
    if(c.key==='foto') return`<th style="white-space:nowrap">Foto</th>`;
    const active=prodSortCol===c.key;const arr=active?(prodSortDir==='asc'?'↑':'↓'):'↕';
    return`<th onclick="setProdSort('${c.key}')" style="cursor:pointer;user-select:none;white-space:nowrap">${c.label} <span style="color:${active?'var(--accent)':'var(--text3)'};font-size:10px">${arr}</span></th>`;
  }).join('')+'<th></th>';

function setProdSort(col){
  prodSortDir=prodSortCol===col?(prodSortDir==='asc'?'desc':'asc'):'asc';prodSortCol=col;
  const sv=document.querySelector('#mainContent .search-box input')?.value||'';
  const cv=document.getElementById('catF')?.value||'';
  const tr=document.querySelector('#mainContent thead tr');if(tr)tr.innerHTML=prodHeaderCells();
  filterProd(sv,cv);
}
function sortProducts(list){
  const dir=prodSortDir==='asc'?1:-1;
  return[...list].sort((a,b)=>{
    let va,vb;
    if(prodSortCol==='estado'){va=a.stock<a.minStock?0:1;vb=b.stock<b.minStock?0:1;}
    else{va=a[prodSortCol];vb=b[prodSortCol];}
    if(typeof va==='string')return va.localeCompare(vb,'es',{sensitivity:'base'})*dir;
    return((va||0)-(vb||0))*dir;
  });
}
const CAT_COLORS={'EPP':'#0ea5e9','Ropa':'#8b5cf6','Materiales OyM':'#f59e0b','Herramientas':'#10b981','Material':'#8b5cf6'};
const CAT_PAL=['#0ea5e9','#8b5cf6','#10b981','#f59e0b','#ec4899','#14b8a6','#f97316','#a78bfa'];
function catColor(cat){if(CAT_COLORS[cat])return CAT_COLORS[cat];let h=0;for(let i=0;i<cat.length;i++)h=(h*31+cat.charCodeAt(i))>>>0;return CAT_PAL[h%CAT_PAL.length];}
function catPillStyle(cat){const c=catColor(cat);return`background:${c}14;color:${c};border:1px solid ${c}30`;}

        ${currentImg?`<button class="btn-sm danger" style="margin-top:8px;font-size:11px" onclick="removeProductPhoto('${id||''}')">Eliminar foto actual</button>`:''}
      </div>
      <div class="form-actions">
        <button class="btn-sm" onclick="closeOverlay()">Cancelar</button>
        <button class="btn-sm accent" onclick="saveProduct('${id||''}')">${I.check} Guardar</button>
      </div>
    </div>
  </div>`;
}
let pendingPhotoFile=null;
function handlePhotoSelect(file){
  if(!file)return;
  if(file.size>5*1024*1024){toast('La imagen no puede superar 5MB','err');return;}
  pendingPhotoFile=file;
  const reader=new FileReader();
  reader.onload=e=>{
    const content=document.getElementById('photoDropContent');
    if(content) content.innerHTML=`<img src="${e.target.result}" class="photo-preview-img" alt="preview">
      <div style="font-size:11px;color:var(--success);margin-top:6px">✓ ${file.name} — lista para guardar</div>`;
  };
  reader.readAsDataURL(file);
}
function onCatSelectChange(sel){
  const ni=document.getElementById('fp-cat-new');
  ni.style.display=sel.value==='__new__'?'block':'none';
  if(sel.value==='__new__')ni.focus();
}
async function uploadProductPhoto(file, productId){
  const ext=file.name.split('.').pop().toLowerCase();
  const path=`${productId}.${ext}`;
  const res=await fetch(`${SB_URL}/storage/v1/object/product-images/${path}`,{
    method:'POST',
    headers:{...SBH,'Content-Type':file.type,'x-upsert':'true'},
    body:file
  });
  if(!res.ok) throw new Error(await res.text());
  return `${SB_URL}/storage/v1/object/public/product-images/${path}?t=${Date.now()}`;
}
async function removeProductPhoto(id){
  if(!confirm('¿Eliminar la foto de este producto?'))return;
  try{
    const p=DB.products.find(pr=>pr.id===id);
    if(p?.image_url){
      const path=p.image_url.split('/product-images/')[1]?.split('?')[0];
      if(path) await fetch(`${SB_URL}/storage/v1/object/product-images/${path}`,{method:'DELETE',headers:SBH});
    }
    await sbPatch('products',id,{image_url:null});
    if(p) p.image_url=null;
    closeOverlay(); toast('Foto eliminada'); navigate('products');
  }catch(e){toast('Error: '+e.message,'err');}
}
async function saveProduct(id){
  const code=document.getElementById('fp-code').value.trim();
  const name=document.getElementById('fp-name').value.trim();
  let cat=document.getElementById('fp-cat').value;
  const stock=parseInt(document.getElementById('fp-stock').value)||0;
  const minStock=parseInt(document.getElementById('fp-min').value)||5;
  const unit=document.getElementById('fp-unit').value.trim()||'u';
  if(cat==='__new__'){
    cat=document.getElementById('fp-cat-new').value.trim();
    if(!cat){toast('Ingresá el nombre de la nueva categoría','err');return;}
    if(!DB.categories.includes(cat)){
      try{const[res]=await sbPost('categories',{name:cat});DB.categories.push(cat);DB.catIds[cat]=res.id;}
      catch(e){toast('Error al crear categoría: '+e.message,'err');return;}
    }
  }
  if(!code||!name){toast('Completá los campos requeridos','err');return;}
  const dup=DB.products.find(pr=>pr.code.toLowerCase()===code.toLowerCase()&&pr.id!==id);
  if(dup){toast(`Ya existe un producto con ese código: "${dup.name}"`,'err');return;}
  try{
    const body={code,name,category:cat,stock,min_stock:minStock,unit};
    let savedId=id;
    if(id){
      await sbPatch('products',id,body);
      const p=DB.products.find(pr=>pr.id===id);
      if(p)Object.assign(p,{code,name,category:cat,stock,minStock,unit});
    }else{
      const[res]=await sbPost('products',body);
      DB.products.push({...res,minStock:res.min_stock});
      savedId=res.id;
    }
    // upload photo if selected
    if(pendingPhotoFile&&savedId){
      try{
        const url=await uploadProductPhoto(pendingPhotoFile,savedId);
        await sbPatch('products',savedId,{image_url:url});
        const p=DB.products.find(pr=>pr.id===savedId);
        if(p) p.image_url=url;
        pendingPhotoFile=null;
      }catch(e){toast('Producto guardado pero la foto falló: '+e.message,'err');}
    }
    closeOverlay();toast(id?'Producto actualizado':'Producto creado');navigate('products');
  }catch(e){toast('Error: '+e.message,'err');}
}
async function deleteProduct(id){
  if(!confirm('¿Eliminar este producto?'))return;
  try{await sbDel('products',id);DB.products=DB.products.filter(p=>p.id!==id);toast('Producto eliminado');navigate('products');}
  catch(e){toast('Error: '+e.message,'err');}
}

function renderCategoryManagerList(){

    return`<div style="display:flex;align-items:center;gap:8px;padding:8px 0;border-bottom:1px solid var(--border)">

      <input type="text" value="${c}" id="catEdit${i}" style="flex:1;background:var(--navy);border:1px solid var(--border);color:var(--text);border-radius:8px;padding:7px 10px;font-size:13px;outline:none">

async function renameCategory(i){
  const oldName=DB.categories[i];
  const newName=document.getElementById('catEdit'+i).value.trim();
  if(!newName){toast('El nombre no puede estar vacío','err');return;}
  if(newName===oldName)return;
  if(DB.categories.includes(newName)){toast('Ya existe esa categoría','err');return;}
  try{
    const catId=DB.catIds[oldName];
    if(catId)await sbPatch('categories',catId,{name:newName});
    const prods=DB.products.filter(p=>p.category===oldName);
    for(const p of prods){await sbPatch('products',p.id,{category:newName});p.category=newName;}
    DB.categories[i]=newName;delete DB.catIds[oldName];DB.catIds[newName]=catId;
    toast('Categoría actualizada');renderCategoryManagerList();
  }catch(e){toast('Error: '+e.message,'err');}
}
async function removeCategory(i){
  const name=DB.categories[i];
  const count=DB.products.filter(p=>p.category===name).length;
  if(count>0){toast(`No se puede eliminar: ${count} producto(s) la usan`,'err');return;}
  if(!confirm(`¿Eliminar la categoría "${name}"?`))return;
  try{
    const catId=DB.catIds[name];if(catId)await sbDel('categories',catId);
    DB.categories.splice(i,1);delete DB.catIds[name];
    toast('Categoría eliminada');renderCategoryManagerList();
  }catch(e){toast('Error: '+e.message,'err');}
}
async function addCategory(){
  const input=document.getElementById('newCatInput');const name=input.value.trim();
  if(!name){toast('Ingresá un nombre','err');return;}
  if(DB.categories.includes(name)){toast('Ya existe esa categoría','err');return;}
  try{
    const[res]=await sbPost('categories',{name});
    DB.categories.push(name);DB.catIds[name]=res.id;
    input.value='';toast('Categoría agregada');renderCategoryManagerList();
  }catch(e){toast('Error: '+e.message,'err');}
}

function resetImport(){
  importRows=[];
  document.getElementById('importPreview').style.display='none';
  document.getElementById('importDropZone').style.display='block';
  document.getElementById('importFileInput').value='';
}

async function handleImportFile(file){
  if(!file) return;
  const ext=file.name.split('.').pop().toLowerCase();
  try{
    if(ext==='csv'){
      const text=await file.text();
      parseImportCSV(text);
    }else if(ext==='xlsx'){
      await parseImportXLSX(file);
    }else{
      toast('Formato no soportado. Usá CSV o XLSX','err'); return;
    }
  }catch(e){ toast('Error al leer el archivo: '+e.message,'err'); }
}

function parseImportCSV(text){
  const lines=text.trim().split(/\r?\n/);
  if(lines.length<2){toast('El archivo está vacío o solo tiene encabezados','err');return;}
  const sep=lines[0].includes(';')?';':',';
  const headers=lines[0].split(sep).map(h=>h.trim().replace(/^"|"$/g,'').toLowerCase());
  const required=['code','name','category','stock','min_stock','unit'];
  const missing=required.filter(r=>!headers.includes(r));
  if(missing.length){toast(`Faltan columnas: ${missing.join(', ')}`,'err');return;}
  const rows=[];
  for(let i=1;i<lines.length;i++){
    if(!lines[i].trim())continue;
    const cols=lines[i].split(sep).map(c=>c.trim().replace(/^"|"$/g,''));
    const row={};
    headers.forEach((h,idx)=>row[h]=cols[idx]||'');
    rows.push(row);
  }
  showImportPreview(rows);
}

async function parseImportXLSX(file){
  // Load SheetJS dynamically
  if(!window.XLSX){
    await new Promise((res,rej)=>{
      const s=document.createElement('script');
      s.src='https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js';
      s.onload=res; s.onerror=()=>rej(new Error('No se pudo cargar la librería XLSX'));
      document.head.appendChild(s);
    });
  }
  const buf=await file.arrayBuffer();
  const wb=XLSX.read(buf,{type:'array'});
  const ws=wb.Sheets[wb.SheetNames[0]];
  const data=XLSX.utils.sheet_to_json(ws,{defval:''});
  // normalize headers to lowercase
  const rows=data.map(r=>{
    const n={};
    Object.keys(r).forEach(k=>n[k.trim().toLowerCase()]=String(r[k]).trim());
    return n;
  });
  const required=['code','name','category','stock','min_stock','unit'];
  if(rows.length&&required.some(k=>!(k in rows[0]))){
    const missing=required.filter(k=>!(k in rows[0]));
    toast(`Faltan columnas: ${missing.join(', ')}`,'err'); return;
  }
  showImportPreview(rows);
}

function showImportPreview(rows){
  importRows=rows;
  const errors=[];
  const tbody=[];
  let newCount=0,updateCount=0;

  rows.forEach((r,i)=>{
    const rowErrors=[];
    if(!r.code) rowErrors.push('código vacío');
    if(!r.name) rowErrors.push('nombre vacío');
    if(!r.category) rowErrors.push('categoría vacía');
    const stock=parseInt(r.stock);
    const minStock=parseInt(r.min_stock);
    if(isNaN(stock)) rowErrors.push('stock inválido');
    if(isNaN(minStock)) rowErrors.push('min_stock inválido');
    if(!r.unit) rowErrors.push('unidad vacía');

    const exists=DB.products.find(p=>p.code.toLowerCase()===r.code.toLowerCase());
    const status=rowErrors.length>0?'err':exists?'update':'new';
    if(status==='new') newCount++;
    if(status==='update') updateCount++;
    if(rowErrors.length) errors.push(`Fila ${i+2}: ${rowErrors.join(', ')}`);

    const statusPill={
      'new':`<span style="background:#10b98114;color:#34d399;border:1px solid #10b98130;border-radius:12px;padding:2px 7px;font-size:10px;white-space:nowrap">Nuevo</span>`,
      'update':`<span style="background:#f59e0b14;color:#fbbf24;border:1px solid #f59e0b30;border-radius:12px;padding:2px 7px;font-size:10px;white-space:nowrap">Actualiza</span>`,
      'err':`<span style="background:#ef444414;color:#f87171;border:1px solid #ef444430;border-radius:12px;padding:2px 7px;font-size:10px;white-space:nowrap">Error</span>`,
    }[status];

    tbody.push(`<tr style="border-bottom:1px solid var(--border)${rowErrors.length?';background:#ef444408':''}">
      <td style="padding:6px 10px;color:var(--text3)">${i+1}</td>
      <td style="padding:6px 10px;font-family:monospace;font-size:11px;color:var(--accent)">${r.code||'—'}</td>
      <td style="padding:6px 10px">${r.name||'—'}</td>
      <td style="padding:6px 10px">${r.category||'—'}</td>
      <td style="padding:6px 10px">${r.stock||'0'}</td>
      <td style="padding:6px 10px">${r.min_stock||'0'}</td>
      <td style="padding:6px 10px">${r.unit||'—'}</td>
      <td style="padding:6px 10px">${statusPill}</td>
    </tr>`);
  });

  document.getElementById('importDropZone').style.display='none';
  document.getElementById('importPreview').style.display='block';
  document.getElementById('importSummary').innerHTML=
    `<strong style="color:var(--text)">${rows.length} filas leídas</strong> — 
     <span style="color:#34d399">${newCount} nuevos</span> · 
     <span style="color:#fbbf24">${updateCount} actualizaciones</span>
     ${errors.length?`· <span style="color:#f87171">${errors.length} con errores (se omiten)</span>`:''}`;
  document.getElementById('importTableBody').innerHTML=tbody.join('');

  const errDiv=document.getElementById('importErrors');
  if(errors.length){
    errDiv.style.display='block';
    errDiv.innerHTML='<strong>Filas con errores (no se importan):</strong><br>'+errors.join('<br>');
  }else{
    errDiv.style.display='none';
  }
  document.getElementById('importConfirmBtn').disabled=newCount+updateCount===0;
}

async function confirmImport(){
  const validRows=importRows.filter(r=>{
    return r.code&&r.name&&r.category&&!isNaN(parseInt(r.stock))&&!isNaN(parseInt(r.min_stock))&&r.unit;
  });
  if(!validRows.length){toast('No hay filas válidas para importar','err');return;}

  const btn=document.getElementById('importConfirmBtn');
  btn.disabled=true; btn.textContent='Importando...';

  let ok=0,fail=0;
  for(const r of validRows){
    try{
      const body={code:r.code.trim(),name:r.name.trim(),category:r.category.trim(),stock:parseInt(r.stock)||0,min_stock:parseInt(r.min_stock)||0,unit:r.unit.trim()};
      const exists=DB.products.find(p=>p.code.toLowerCase()===body.code.toLowerCase());
      if(exists){
        await sbPatch('products',exists.id,body);
        Object.assign(exists,{...body,minStock:body.min_stock});
      }else{
        // create category if new
        if(!DB.categories.includes(body.category)){
          try{const[res]=await sbPost('categories',{name:body.category});DB.categories.push(body.category);DB.catIds[body.category]=res.id;}catch(_){}
        }
        const[res]=await sbPost('products',body);
        DB.products.push({...res,minStock:res.min_stock});
      }
      ok++;
    }catch(e){ fail++; }
  }
  closeOverlay();
  toast(`Importación completada: ${ok} productos${fail?` · ${fail} errores`:''}`, fail>0?'err':'ok');
  navigate('products');
}
