<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Stock Control</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --navy:#0f172a;--navy2:#1e293b;--navy3:#334155;
  --accent:#0ea5e9;--accent2:#0284c7;
  --success:#10b981;--warn:#f59e0b;--danger:#ef4444;
  --text:#f8fafc;--text2:#94a3b8;--text3:#64748b;
  --border:#334155;--card:#1e293b;--surface:#0f172a;
}
html,body{min-height:100%;background:var(--surface);color:var(--text);font-family:'Segoe UI',system-ui,sans-serif;font-size:16px}
.app{display:flex;flex-direction:column;min-height:100vh}

/* LOGIN */
.login-screen{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:1.5rem}
.login-box{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:2rem;width:100%;max-width:420px}
.login-logo{text-align:center;margin-bottom:1.5rem}
.login-logo h1{font-size:20px;font-weight:600;letter-spacing:-.5px}
.login-logo p{font-size:13px;color:var(--text2);margin-top:4px}
.badge-logo{background:linear-gradient(135deg,#0ea5e9,#0284c7);width:52px;height:52px;border-radius:14px;display:inline-flex;align-items:center;justify-content:center;margin-bottom:10px;box-shadow:0 4px 14px #0ea5e940}
.user-grid{display:grid;gap:8px;margin-bottom:1.25rem;max-height:280px;overflow-y:auto}
.user-card{background:var(--navy);border:1px solid var(--border);border-radius:10px;padding:11px 13px;cursor:pointer;display:flex;align-items:center;gap:11px;transition:border-color .15s,background .15s}
.user-card:hover,.user-card.selected{border-color:var(--accent);background:#0ea5e910}
.user-avatar{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:600;flex-shrink:0}
.user-info p{font-size:14px;font-weight:500;line-height:1.2}
.user-info span{font-size:12px;color:var(--text2)}
.role-badge{margin-left:auto;font-size:11px;padding:3px 8px;border-radius:20px;font-weight:500;white-space:nowrap}
.role-admin{background:#0ea5e918;color:var(--accent);border:1px solid #0ea5e940}
.role-user{background:#10b98118;color:var(--success);border:1px solid #10b98140}
.form-row{margin-bottom:12px}
.form-row label{display:block;font-size:10px;color:var(--text3);margin-bottom:5px;font-weight:500;letter-spacing:.5px;text-transform:uppercase}
.form-row input,.form-row select{width:100%;background:var(--navy);border:1px solid var(--border);color:var(--text);border-radius:8px;padding:10px 12px;font-size:14px;outline:none;font-family:inherit}
.form-row input:focus,.form-row select:focus{border-color:var(--accent)}
.btn-primary{width:100%;padding:12px;background:linear-gradient(135deg,#0ea5e9,#0284c7);color:#fff;border:none;border-radius:10px;font-size:15px;font-weight:500;cursor:pointer;box-shadow:0 2px 10px #0ea5e930}
.btn-primary:active{opacity:.88}
.btn-primary:disabled{opacity:.35;cursor:not-allowed;box-shadow:none}

/* TOPBAR */
.topbar{background:var(--card);border-bottom:1px solid var(--border);padding:0 1rem;height:52px;display:flex;align-items:center;gap:10px;position:sticky;top:0;z-index:100}
.topbar-brand{font-size:14px;font-weight:600;display:flex;align-items:center;gap:8px;flex:1;min-width:0}
.topbar-brand .dot{width:7px;height:7px;border-radius:50%;background:var(--accent);flex-shrink:0;box-shadow:0 0 6px var(--accent)}
.topbar-name{font-size:12px;color:var(--text2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:160px}
.btn-logout{background:transparent;border:1px solid var(--border);color:var(--text2);padding:6px 10px;border-radius:8px;font-size:12px;cursor:pointer;white-space:nowrap;display:flex;align-items:center;gap:5px}

/* LAYOUT */
.layout{display:flex;flex:1;min-height:0}
.sidebar{width:192px;background:var(--card);border-right:1px solid var(--border);padding:.75rem 0;flex-shrink:0}
.nav-item{display:flex;align-items:center;gap:9px;padding:9px 14px;font-size:13px;color:var(--text3);cursor:pointer;border-left:2px solid transparent;transition:all .15s}
.nav-item:hover{color:var(--text2);background:#ffffff06}
.nav-item.active{color:var(--accent);border-left-color:var(--accent);background:#0ea5e910}
.nav-item svg{width:16px;height:16px;stroke:currentColor;fill:none;stroke-width:1.7;stroke-linecap:round;stroke-linejoin:round;flex-shrink:0}
.nav-section{font-size:9px;font-weight:600;letter-spacing:1.2px;color:var(--text3);padding:8px 14px 3px;margin-top:4px;text-transform:uppercase;opacity:.7}
.main{flex:1;padding:1.25rem;overflow:auto}
.mobile-nav{display:none;position:fixed;bottom:0;left:0;right:0;background:var(--card);border-top:1px solid var(--border);z-index:100;padding:0 0 env(safe-area-inset-bottom,0)}
.mobile-nav-inner{display:flex;justify-content:space-around}
.mnav-item{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:8px 4px;cursor:pointer;color:var(--text3);font-size:9px;gap:3px;min-height:50px}
.mnav-item svg{width:20px;height:20px;stroke:currentColor;fill:none;stroke-width:1.7;stroke-linecap:round;stroke-linejoin:round}
.mnav-item.active{color:var(--accent)}
.main-mobile-pad{padding-bottom:calc(62px + env(safe-area-inset-bottom,0))}

/* STATS */
.stats-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-bottom:1.25rem}
@media(min-width:600px){.stats-grid{grid-template-columns:repeat(4,1fr)}}
.stat-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:13px 15px;position:relative;overflow:hidden}
.stat-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--accent-c,#0ea5e9),transparent)}
.stat-label{font-size:11px;color:var(--text3);margin-bottom:5px;display:flex;align-items:center;gap:5px}
.stat-label svg{width:13px;height:13px;stroke:currentColor;fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}
.stat-value{font-size:24px;font-weight:600;letter-spacing:-.5px}
.stat-sub{font-size:10px;color:var(--text3);margin-top:2px}

/* SECTION HEADER */
.section-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:.9rem;flex-wrap:wrap;gap:8px}
.section-title{font-size:15px;font-weight:500}

/* BUTTONS */
.btn-sm{padding:6px 12px;border-radius:8px;font-size:12px;font-weight:500;cursor:pointer;display:inline-flex;align-items:center;gap:5px;border:1px solid var(--border);background:var(--card);color:var(--text2);transition:all .12s}
.btn-sm:active{opacity:.75}
.btn-sm.accent{background:var(--accent);border-color:var(--accent);color:#fff}
.btn-sm.success{background:var(--success);border-color:var(--success);color:#fff}
.btn-sm svg{width:13px;height:13px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}

/* ICON BUTTONS */
.action-btns{display:flex;gap:3px}
.icon-btn{background:transparent;border:1px solid transparent;color:var(--text3);cursor:pointer;padding:5px;border-radius:6px;display:inline-flex;align-items:center;justify-content:center;transition:all .12s;min-width:28px;min-height:28px}
.icon-btn:hover{background:var(--navy);border-color:var(--border);color:var(--text)}
.icon-btn.del:hover{background:#ef444412;border-color:#ef444440;color:var(--danger)}
.icon-btn svg{width:13px;height:13px;stroke:currentColor;fill:none;stroke-width:1.7;stroke-linecap:round;stroke-linejoin:round}

/* TABLE */
.table-wrap{background:var(--card);border:1px solid var(--border);border-radius:12px;overflow:hidden}
.table-toolbar{padding:10px 14px;border-bottom:1px solid var(--border);display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.search-box{flex:1;min-width:120px;position:relative}
.search-box svg{position:absolute;left:9px;top:50%;transform:translateY(-50%);width:13px;height:13px;stroke:var(--text3);fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;pointer-events:none}
.search-box input{width:100%;background:var(--navy);border:1px solid var(--border);color:var(--text);border-radius:8px;padding:7px 10px 7px 29px;font-size:13px;outline:none}
.search-box input:focus{border-color:var(--accent)}
.select-filter{background:var(--navy);border:1px solid var(--border);color:var(--text);border-radius:8px;padding:7px 10px;font-size:13px;outline:none}
.tbl-scroll{overflow-x:auto;-webkit-overflow-scrolling:touch}
table{width:100%;border-collapse:collapse;min-width:400px}
th{font-size:10px;font-weight:500;color:var(--text3);text-transform:uppercase;letter-spacing:.6px;padding:9px 14px;text-align:left;border-bottom:1px solid var(--border);white-space:nowrap}
td{padding:10px 14px;font-size:13px;border-bottom:1px solid var(--border);vertical-align:middle}
tr:last-child td{border-bottom:none}
tr:hover td{background:#ffffff04}

/* PILLS */
.pill{display:inline-block;padding:2px 8px;border-radius:20px;font-size:11px;font-weight:500;white-space:nowrap}
.pill-in{background:#10b98114;color:#34d399;border:1px solid #10b98130}
.pill-out{background:#f59e0b14;color:#fbbf24;border:1px solid #f59e0b30}
.pill-low{background:#ef444414;color:#f87171;border:1px solid #ef444430}
.pill-ok{background:#10b98114;color:#34d399;border:1px solid #10b98130}

/* CHIPS */
.chips{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:1rem}
.chip{padding:5px 13px;border-radius:20px;font-size:12px;font-weight:500;cursor:pointer;border:1px solid var(--border);background:transparent;color:var(--text3);transition:all .12s}
.chip.active,.chip:hover{border-color:var(--accent);color:var(--accent);background:#0ea5e910}

/* OVERLAY */
.overlay{position:fixed;inset:0;background:#00000090;z-index:200;display:flex;align-items:center;justify-content:center;padding:1rem;backdrop-filter:blur(2px)}
.panel{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:1.5rem;width:100%;max-width:460px;max-height:90vh;overflow-y:auto;box-shadow:0 20px 60px #00000060}
.panel-title{font-size:14px;font-weight:600;margin-bottom:1.25rem;display:flex;align-items:center;justify-content:space-between}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.form-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:1.25rem}

/* REGISTRO */
.reg-wrap{display:grid;grid-template-columns:1fr 1fr;gap:1.25rem;align-items:start}
@media(max-width:640px){.reg-wrap{grid-template-columns:1fr}}
.reg-card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:1.25rem}
.reg-field{margin-bottom:1rem}
.reg-field label{display:block;font-size:10px;font-weight:600;color:var(--text3);letter-spacing:.6px;text-transform:uppercase;margin-bottom:6px}
.reg-field input,.reg-field select{width:100%;background:var(--navy);border:1px solid var(--border);color:var(--text);border-radius:10px;padding:12px 14px;font-size:16px;outline:none;font-family:inherit;transition:border-color .15s}
.reg-field input:focus{border-color:var(--accent)}
.prod-hint{margin-top:6px;padding:8px 12px;border-radius:8px;font-size:12px;display:none}
.prod-hint.found{display:block;background:#10b98110;border:1px solid #10b98130;color:#34d399}
.prod-hint.notfound{display:block;background:#ef444410;border:1px solid #ef444430;color:#f87171}
.type-toggle{display:flex;gap:6px;margin-bottom:1rem}
.type-btn{flex:1;padding:10px 8px;border-radius:10px;font-size:12px;font-weight:500;cursor:pointer;border:1px solid var(--border);background:var(--navy);color:var(--text3);transition:all .15s;text-align:center}
.type-btn.active-in{border-color:#10b98140;background:#10b98110;color:#34d399}
.type-btn.active-out{border-color:#f59e0b40;background:#f59e0b10;color:#fbbf24}
.prod-list{background:var(--navy);border:1px solid var(--border);border-radius:10px;overflow:hidden;max-height:380px;overflow-y:auto}
.prod-list-item{padding:9px 13px;font-size:13px;cursor:pointer;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;transition:background .1s}
.prod-list-item:last-child{border-bottom:none}
.prod-list-item:active,.prod-list-item:hover{background:#ffffff06}

/* QR */
.qr-btn{width:100%;padding:12px;border-radius:10px;border:1px dashed #0ea5e940;background:#0ea5e908;color:var(--accent);font-size:13px;font-weight:500;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;margin-top:.75rem}
.qr-btn svg{width:16px;height:16px;stroke:currentColor;fill:none;stroke-width:1.7;stroke-linecap:round;stroke-linejoin:round}
.scanner-modal{position:fixed;inset:0;background:#000;z-index:300;display:flex;flex-direction:column}
.scanner-header{padding:.75rem 1rem;display:flex;align-items:center;justify-content:space-between;background:linear-gradient(#000a,transparent);position:absolute;top:0;left:0;right:0;z-index:1}
.scanner-header h2{color:#fff;font-size:14px;font-weight:500}
.scanner-close{background:#ffffff18;border:1px solid #ffffff30;color:#fff;padding:6px 14px;border-radius:8px;font-size:12px;cursor:pointer}
#qrVideo{width:100%;height:100%;object-fit:cover;display:block}
.scanner-overlay{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;pointer-events:none}
.scanner-frame{width:220px;height:220px;border:2px solid var(--accent);border-radius:14px;box-shadow:0 0 0 9999px rgba(0,0,0,.6)}
.scanner-hint{position:absolute;bottom:2.5rem;left:0;right:0;text-align:center;color:#ffffff90;font-size:12px}
.scanner-status{position:absolute;bottom:4.5rem;left:0;right:0;text-align:center;color:var(--accent);font-size:12px;font-weight:500}

/* LOADER */
.loading-screen{position:fixed;inset:0;background:var(--surface);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:999;gap:16px}
.spinner{width:36px;height:36px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* TOAST */
.toast{position:fixed;bottom:calc(68px + env(safe-area-inset-bottom,0));right:14px;background:var(--navy2);border:1px solid var(--border);border-radius:10px;padding:10px 14px;font-size:13px;z-index:999;display:flex;align-items:center;gap:8px;animation:toastIn .2s ease;max-width:280px;box-shadow:0 4px 20px #0008}
@media(min-width:641px){.toast{bottom:18px}}
.toast svg{width:15px;height:15px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;flex-shrink:0}
.toast.ok svg{color:var(--success)}
.toast.err svg{color:var(--danger)}
@keyframes toastIn{from{transform:translateY(12px);opacity:0}to{transform:translateY(0);opacity:1}}
.empty{padding:2rem;text-align:center;color:var(--text3);font-size:13px}
.empty svg{width:24px;height:24px;stroke:currentColor;fill:none;stroke-width:1.5;stroke-linecap:round;margin-bottom:6px;display:block;margin-inline:auto;opacity:.5}

@media(max-width:640px){
  .sidebar{display:none}
  .mobile-nav{display:block}
  .main{padding:1rem;padding-bottom:0}
  .dashboard-grid{grid-template-columns:1fr!important}
  table{min-width:360px}
}
</style>
</head>
<body>
<div class="app" id="app">

<!-- LOADING -->
<div class="loading-screen" id="loadingScreen">
  <div class="spinner"></div>
  <p style="font-size:13px;color:var(--text2)">Conectando con la base de datos...</p>
</div>

<!-- LOGIN -->
<div class="login-screen" id="loginScreen" style="display:none">
  <div class="login-box">
    <div class="login-logo">
      <div class="badge-logo">
        <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M21 16V8a2 2 0 00-1-1.73l-7-4a2 2 0 00-2 0l-7 4A2 2 0 003 8v8a2 2 0 001 1.73l7 4a2 2 0 002 0l7-4A2 2 0 0021 16z"/><polyline points="3.27 6.96 12 12.01 20.73 6.96"/><line x1="12" y1="22.08" x2="12" y2="12"/></svg>
      </div>
      <h1>StockControl Pro</h1>
      <p>Gestión de materiales y EPP</p>
    </div>
    <p style="font-size:12px;color:var(--text3);margin-bottom:10px">Seleccioná tu usuario:</p>
    <div class="user-grid" id="userGrid"></div>
    <div class="form-row" id="pwdRow" style="display:none;margin-top:4px">
      <label>Contraseña</label>
      <input type="password" id="loginPwd" placeholder="••••" autocomplete="off"
        oninput="document.getElementById('loginError').style.display='none'"
        onkeydown="if(event.key==='Enter')doLogin()">
      <div id="loginError" style="display:none;color:#f87171;font-size:12px;margin-top:6px">Contraseña incorrecta</div>
    </div>
    <button class="btn-primary" id="loginBtn" disabled onclick="doLogin()" style="margin-top:8px">Ingresar</button>
  </div>
</div>

<!-- MAIN APP -->
<div style="display:none;flex-direction:column;flex:1" id="mainApp">
  <div class="topbar">
    <div class="topbar-brand"><div class="dot"></div><span>StockControl Pro</span></div>
    <span class="topbar-name" id="topbarUser"></span>
    <button class="btn-logout" onclick="logout()">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
      Salir
    </button>
  </div>
  <div class="layout">
    <div class="sidebar" id="sidebar"></div>
    <div class="main main-mobile-pad" id="mainContent"></div>
  </div>
  <nav class="mobile-nav" id="mobileNav"></nav>
</div>
</div>

<!-- QR Scanner -->
<div class="scanner-modal" id="scannerModal" style="display:none">
  <div class="scanner-header">
    <h2>Escanear código</h2>
    <button class="scanner-close" onclick="closeScanner()">✕ Cerrar</button>
  </div>
  <video id="qrVideo" playsinline autoplay muted></video>
  <div class="scanner-overlay"><div class="scanner-frame"></div></div>
  <div class="scanner-status" id="scannerStatus"></div>
  <div class="scanner-hint">Apuntá la cámara al código</div>
</div>

<div id="overlayContainer"></div>
<div id="toastContainer"></div>

<script>
// ── SUPABASE CONFIG ──────────────────────────────────────────────
const SUPA_URL = 'https://srjnxgvdlcqmkxnnbclq.supabase.co';
const SUPA_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InNyam54Z3ZkbGNxbWt4bm5iY2xxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE4MDQ5NjQsImV4cCI6MjA5NzM4MDk2NH0.OSyfMQ5s639BQXdEGfUqDMn9ZCubuiRpXt3utyux9P4';

const H = { 'apikey': SUPA_KEY, 'Authorization': 'Bearer '+SUPA_KEY, 'Content-Type': 'application/json', 'Prefer': 'return=representation' };

async function sbGet(table, params=''){
  const r = await fetch(`${SUPA_URL}/rest/v1/${table}?${params}`, { headers: H });
  if(!r.ok) throw new Error(await r.text());
  return r.json();
}
async function sbInsert(table, body){
  const r = await fetch(`${SUPA_URL}/rest/v1/${table}`, { method:'POST', headers: H, body: JSON.stringify(body) });
  if(!r.ok) throw new Error(await r.text());
  return r.json();
}
async function sbUpdate(table, id, body){
  const r = await fetch(`${SUPA_URL}/rest/v1/${table}?id=eq.${id}`, { method:'PATCH', headers:{...H,'Prefer':'return=representation'}, body: JSON.stringify(body) });
  if(!r.ok) throw new Error(await r.text());
  return r.json();
}
async function sbDelete(table, id){
  const r = await fetch(`${SUPA_URL}/rest/v1/${table}?id=eq.${id}`, { method:'DELETE', headers: H });
  if(!r.ok) throw new Error(await r.text());
}

// ── ICONS ────────────────────────────────────────────────────────
const I = {
  edit:`<svg viewBox="0 0 24 24"><path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>`,
  trash:`<svg viewBox="0 0 24 24"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 01-2 2H8a2 2 0 01-2-2L5 6"/><path d="M10 11v6M14 11v6M9 6V4a1 1 0 011-1h4a1 1 0 011 1v2"/></svg>`,
  check:`<svg viewBox="0 0 24 24"><path d="M22 11.08V12a10 10 0 11-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>`,

// ── IN-MEMORY DATA (loaded from Supabase) ────────────────────────
let DB = { users:[], products:[], movements:[], categories:[] };
let currentUser = null, currentView = 'dashboard';
let regType = 'Salida', regScanned = '';
let prodSortCol = 'code', prodSortDir = 'asc';
let movFilter = 'all', movSearch = '';

// ── HELPERS ──────────────────────────────────────────────────────
function toast(msg, type='ok'){
  const t=document.createElement('div');
  t.className='toast '+type;
  t.innerHTML=(type==='ok'?I.check:I.alert)+msg;
  document.getElementById('toastContainer').appendChild(t);
  setTimeout(()=>t.remove(),3500);
}
function closeOverlay(){ document.getElementById('overlayContainer').innerHTML=''; }
function showLoading(show){
  document.getElementById('loadingScreen').style.display = show ? 'flex' : 'none';
}
function catColor(cat){
  const map={'EPP':'#0ea5e9','Ropa':'#8b5cf6','Materiales OyM':'#f59e0b','Herramientas':'#10b981','Material':'#8b5cf6'};
  if(map[cat]) return map[cat];
  const pal=['#0ea5e9','#8b5cf6','#10b981','#f59e0b','#ec4899','#14b8a6','#f97316','#a78bfa'];
  let h=0; for(let i=0;i<cat.length;i++) h=(h*31+cat.charCodeAt(i))>>>0;
  return pal[h%pal.length];
}
function catPillStyle(cat){
  const c=catColor(cat); return `background:${c}14;color:${c};border:1px solid ${c}30`;
}
function today(){ return new Date().toISOString().slice(0,10); }
function daysAgo(n){ const d=new Date(); d.setDate(d.getDate()-n); return d.toISOString().slice(0,10); }

// ── LOAD ALL DATA ────────────────────────────────────────────────
async function loadAll(){
  showLoading(true);
  try{
    const [users, products, movements, categories] = await Promise.all([
      sbGet('app_users','order=name'),
      sbGet('products','order=code'),
      sbGet('movements','order=date.desc,created_at.desc'),
      sbGet('categories','order=name'),
    ]);
    DB.users = users;
    DB.products = products;
    DB.movements = movements;
    DB.categories = categories;
    showLoading(false);
    document.getElementById('loginScreen').style.display='flex';
    renderLogin();
  }catch(e){
    showLoading(false);
    document.getElementById('loadingScreen').innerHTML=`<div style="text-align:center;padding:2rem;color:#f87171"><p style="font-size:15px;font-weight:500;margin-bottom:8px">Error al conectar</p><p style="font-size:13px;color:var(--text2);margin-bottom:16px">${e.message}</p><button onclick="loadAll()" class="btn-primary" style="width:auto;padding:10px 24px">Reintentar</button></div>`;
    document.getElementById('loadingScreen').style.display='flex';
  }
}

// ── LOGIN ────────────────────────────────────────────────────────
function renderLogin(){
  document.getElementById('userGrid').innerHTML = DB.users.map(u=>`
    <div class="user-card" onclick="selectUser('${u.id}')" id="uc${u.id}">
      <div class="user-avatar" style="background:${u.color}22;color:${u.color}">${u.initials}</div>
      <div class="user-info"><p>${u.name}</p><span>${u.role==='admin'?'Administrador':'Operador'}</span></div>
      <span class="role-badge ${u.role==='admin'?'role-admin':'role-user'}">${u.role==='admin'?'Admin':'Usuario'}</span>
    </div>`).join('');
}
function selectUser(id){
  currentUser = DB.users.find(u=>u.id===id);
  document.querySelectorAll('.user-card').forEach(c=>c.classList.remove('selected'));
  document.getElementById('uc'+id).classList.add('selected');
  document.getElementById('loginBtn').disabled = false;
  document.getElementById('pwdRow').style.display = 'block';
  document.getElementById('loginError').style.display = 'none';
  const p = document.getElementById('loginPwd'); p.value=''; setTimeout(()=>p.focus(),50);
}
function doLogin(){
  if(!currentUser) return;
  if(document.getElementById('loginPwd').value !== currentUser.password){
    document.getElementById('loginError').style.display = 'block'; return;
  }
  document.getElementById('loginScreen').style.display = 'none';
  document.getElementById('mainApp').style.display = 'flex';
  document.getElementById('topbarUser').textContent = currentUser.name+(currentUser.role==='admin'?' · Admin':'');
  renderSidebar(); renderMobileNav(); navigate('dashboard');
}
function logout(){
  currentUser=null;
  document.getElementById('mainApp').style.display='none';
  document.getElementById('loginScreen').style.display='flex';
  document.querySelectorAll('.user-card').forEach(c=>c.classList.remove('selected'));
  document.getElementById('loginBtn').disabled=true;
  document.getElementById('pwdRow').style.display='none';
  currentView='dashboard'; regScanned=''; regType='Salida';
  renderLogin();
}

// ── NAV ──────────────────────────────────────────────────────────
function navItems(){
  const a = currentUser.role==='admin';
  return [
    {id:'dashboard',icon:I.nav_dashboard,label:'Dashboard'},
    {id:'movements',icon:I.nav_movements,label:'Movimientos'},
    {id:'register',icon:I.nav_register,label:'Registrar'},
    ...(a?[
      {id:'products',icon:I.nav_products,label:'Productos'},
      {id:'users',icon:I.nav_users,label:'Usuarios'},
      {id:'export',icon:I.nav_export,label:'Exportar'},
    ]:[]),
  ];
}
function renderSidebar(){
  let html='';
  navItems().forEach(item=>{
    if(currentUser.role==='admin'&&item.id==='products') html+=`<div class="nav-section">Admin</div>`;
    html+=`<div class="nav-item ${currentView===item.id?'active':''}" onclick="navigate('${item.id}')">${item.icon}<span>${item.label}</span></div>`;
  });
  document.getElementById('sidebar').innerHTML=html;
}
function renderMobileNav(){
  document.getElementById('mobileNav').innerHTML=`<div class="mobile-nav-inner">${
    navItems().map(it=>`<div class="mnav-item ${currentView===it.id?'active':''}" onclick="navigate('${it.id}')">${it.icon}<span>${it.label}</span></div>`).join('')
  }</div>`;
}
function navigate(view){
  const restricted=['products','users','export'];
  if(currentUser.role!=='admin'&&restricted.includes(view)) view='dashboard';
  currentView=view; renderSidebar(); renderMobileNav();
  const mc=document.getElementById('mainContent'); mc.scrollTop=0;
  if(view==='dashboard') renderDashboard(mc);
  else if(view==='movements') renderMovements(mc);
  else if(view==='register') renderRegister(mc);
  else if(view==='products') renderProducts(mc);
  else if(view==='users') renderUsers(mc);
  else if(view==='export') renderExport(mc);
}

// ── DASHBOARD ADMIN ──────────────────────────────────────────────
function renderDashboard(el){
  if(currentUser.role!=='admin'){ renderUserDashboard(el); return; }
  const lowStock = DB.products.filter(p=>p.stock<p.min_stock).length;
  const totalEPP = DB.products.filter(p=>p.category==='EPP').reduce((a,p)=>a+p.stock,0);
  const todayMovs = DB.movements.filter(m=>m.date===today()).length;

  // EPP por usuario
  const eppByUser={};
  DB.movements.filter(m=>m.type==='Salida'&&DB.products.find(p=>p.id===m.product_id&&p.category==='EPP')).forEach(m=>{
    if(!eppByUser[m.user_id]) eppByUser[m.user_id]={name:m.user_name,total:0,items:{}};
    eppByUser[m.user_id].total+=m.qty;
    eppByUser[m.user_id].items[m.product_name]=(eppByUser[m.user_id].items[m.product_name]||0)+m.qty;
  });
  DB.users.forEach(u=>{ if(!eppByUser[u.id]) eppByUser[u.id]={name:u.name,total:0,items:{}}; });
  const eppList=Object.entries(eppByUser).sort((a,b)=>b[1].total-a[1].total);

  // Ranking categorías

    const p=DB.products.find(pr=>pr.id===m.product_id);

    catC[cat]=(catC[cat]||0)+m.qty;

      <div class="stat-card" style="--accent-c:#10b981"><div class="stat-label" style="color:#34d399">${I.nav_products} EPP total</div><div class="stat-value" style="color:#34d399">${totalEPP}</div><div class="stat-sub">unidades</div></div>
      <div class="stat-card" style="--accent-c:#f59e0b"><div class="stat-label">${I.nav_movements} Hoy</div><div class="stat-value">${todayMovs}</div><div class="stat-sub">movimientos</div></div>
    </div>
    <div class="section-header"><div class="section-title" style="font-size:13px">Ranking categorías — consumo (salidas)</div></div>
    <div class="table-wrap" style="margin-bottom:1rem"><div class="tbl-scroll"><table>
      <thead><tr><th>#</th><th>Categoría</th><th>Total</th><th style="min-width:140px">Distribución</th></tr></thead><tbody>
      ${catRank.length?catRank.map(([cat,total],i)=>{
        const c=catColor(cat),pct=Math.round((total/maxCat)*100);
        return`<tr><td style="color:var(--text3);font-weight:600">${i+1}</td>
          <td><span class="pill" style="${catPillStyle(cat)}">${cat}</span></td>
          <td><span style="font-size:15px;font-weight:600;color:${c}">${total}</span> <span style="font-size:11px;color:var(--text3)">u.</span></td>
          <td><div style="background:var(--navy);border-radius:4px;height:8px;overflow:hidden">
            <div style="height:100%;width:${pct}%;background:${c};border-radius:4px"></div></div></td></tr>`;
      }).join(''):`<tr><td colspan="4" class="empty">${I.inbox}Sin salidas</td></tr>`}
      </tbody></table></div></div>
    <div class="section-header"><div class="section-title" style="font-size:13px">EPP retirado por usuario — histórico</div></div>
    <div class="table-wrap" style="margin-bottom:1rem"><div class="tbl-scroll"><table>
      <thead><tr><th>Usuario</th><th>Total</th><th style="min-width:140px">Distribución</th><th>Detalle</th></tr></thead><tbody>
      ${eppList.map(([uid,data])=>{
        const u=DB.users.find(x=>x.id===uid);
        const c=u?.color||'#64748b', pct=Math.round((data.total/maxEPP)*100);
        const det=Object.entries(data.items).map(([k,v])=>`<span style="display:inline-block;background:${c}18;border:1px solid ${c}30;color:${c};border-radius:12px;padding:1px 7px;font-size:10px;margin:1px 2px">${k}: ${v}</span>`).join('');

            <div style="width:28px;height:28px;border-radius:50%;background:${c}22;color:${c};display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;flex-shrink:0">${u?.initials||'?'}</div>
            <span style="font-size:13px">${data.name}</span></div></td>
          <td><span style="font-size:15px;font-weight:600;color:${data.total>0?c:'var(--text3)'}">${data.total}</span> <span style="font-size:11px;color:var(--text3)">u.</span></td>
          <td><div style="background:var(--navy);border-radius:4px;height:8px;overflow:hidden">

      </div>
    </div>
  </div>`;

async function saveMovement(id){
  const m=DB.movements.find(x=>x.id===id);
  if(!m) return;
  const date=document.getElementById('fm-date').value;
  const prodId=document.getElementById('fm-prod').value;
  const type=document.getElementById('fm-type').value;
  const qty=parseInt(document.getElementById('fm-qty').value)||1;
  const userId=document.getElementById('fm-user').value;
  const u=DB.users.find(x=>x.id===userId);
  const p=DB.products.find(x=>x.id===prodId);
  if(!date||!p||qty<1){toast('Completá todos los campos','err');return;}
  try{
    // revert old stock
    const oldP=DB.products.find(x=>x.id===m.product_id);
    if(oldP){
      const newStock=m.type==='Entrada'?oldP.stock-m.qty:oldP.stock+m.qty;
      await sbUpdate('products',oldP.id,{stock:newStock});
      oldP.stock=newStock;
    }
    // apply new stock
    const newStock2=type==='Entrada'?p.stock+qty:p.stock-qty;
    await sbUpdate('products',p.id,{stock:newStock2});
    p.stock=newStock2;
    // update movement
    const upd={date,product_id:p.id,product_name:p.name,product_code:p.code,type,qty,user_id:userId,user_name:u?.name||m.user_name};
    const res=await sbUpdate('movements',id,upd);
    Object.assign(m,res[0]||upd);
    closeOverlay(); toast('Movimiento actualizado'); navigate('movements');
  }catch(e){ toast('Error: '+e.message,'err'); }
}
async function deleteMovement(id){
  if(!confirm('¿Eliminar este movimiento?')) return;
  const m=DB.movements.find(x=>x.id===id);
  try{
    if(m){
      const p=DB.products.find(x=>x.id===m.product_id);
      if(p){
        const ns=m.type==='Entrada'?p.stock-m.qty:p.stock+m.qty;
        await sbUpdate('products',p.id,{stock:ns});
        p.stock=ns;
      }
    }
    await sbDelete('movements',id);
    DB.movements=DB.movements.filter(x=>x.id!==id);
    toast('Movimiento eliminado'); navigate('movements');
  }catch(e){ toast('Error: '+e.message,'err'); }
}

async function submitMovement(){

let scanStream=null;
async function openScanner(){
  document.getElementById('scannerModal').style.display='flex';
  document.getElementById('scannerStatus').textContent='';
  const video=document.getElementById('qrVideo');
  if(scanStream){ scanStream.getTracks().forEach(t=>t.stop()); scanStream=null; }
  try{
    scanStream=await navigator.mediaDevices.getUserMedia({video:{facingMode:{ideal:'environment'},width:{ideal:1280},height:{ideal:720}}});
    video.srcObject=scanStream;
    video.onloadedmetadata=()=>{ video.play(); startZXing(video); };
  }catch(err){
    document.getElementById('scannerModal').style.display='none';
    toast(err.name==='NotAllowedError'?'Permiso de cámara denegado':'No se pudo abrir la cámara','err');
  }
}
function startZXing(video){
  if(typeof ZXing==='undefined'){ document.getElementById('scannerStatus').textContent='Ingresá el código manualmente'; return; }
  try{
    const reader=new ZXing.BrowserMultiFormatReader();
    reader.decodeFromVideoElement(video,(result)=>{
      if(result){ const code=result.getText(); closeScanner(); fillRegCode(code); toast('Código escaneado: '+code); }
    });
    window._zxingReader=reader;
  }catch(e){}
}
function closeScanner(){
  document.getElementById('scannerModal').style.display='none';
  if(scanStream){ scanStream.getTracks().forEach(t=>t.stop()); scanStream=null; }
  if(window._zxingReader){ try{window._zxingReader.reset();}catch(e){} window._zxingReader=null; }
}

function prodHeaderCells(){
  const cols=[{key:'code',label:'Código'},{key:'name',label:'Nombre'},{key:'category',label:'Cat.'},{key:'stock',label:'Stock'},{key:'min_stock',label:'Mín'},{key:'estado',label:'Estado'}];
  return cols.map(c=>{
    const active=prodSortCol===c.key;
    const arrow=active?(prodSortDir==='asc'?'↑':'↓'):'↕';
    return `<th onclick="setProdSort('${c.key}')" style="cursor:pointer;user-select:none;white-space:nowrap">${c.label} <span style="color:${active?'var(--accent)':'var(--text3)'};font-size:10px">${arrow}</span></th>`;
  }).join('')+'<th></th>';
}
function setProdSort(col){
  prodSortDir = prodSortCol===col ? (prodSortDir==='asc'?'desc':'asc') : 'asc';
  prodSortCol=col;
  const searchVal=document.querySelector('#mainContent .search-box input')?.value||'';
  const catVal=document.getElementById('catF')?.value||'';
  const theadRow=document.querySelector('#mainContent thead tr');
  if(theadRow) theadRow.innerHTML=prodHeaderCells();
  filterProd(searchVal,catVal);
}
function sortProducts(list){
  const dir=prodSortDir==='asc'?1:-1;
  return [...list].sort((a,b)=>{
    let va,vb;
    if(prodSortCol==='estado'){ va=a.stock<a.min_stock?0:1; vb=b.stock<b.min_stock?0:1; }
    else{ va=a[prodSortCol]; vb=b[prodSortCol]; }
    if(typeof va==='string') return va.localeCompare(vb,'es',{sensitivity:'base'})*dir;
    return ((va||0)-(vb||0))*dir;
  });
}
function renderProdRows(prods){
  if(!prods.length) return`<tr><td colspan="7" class="empty">${I.inbox}Sin productos</td></tr>`;
  return sortProducts(prods).map(p=>`<tr>

    <td>${p.name}</td>

}

  const ni=document.getElementById('fp-cat-new');
  ni.style.display=sel.value==='__new__'?'block':'none';
  if(sel.value==='__new__') ni.focus();
}
async function saveProduct(id){
  const code=document.getElementById('fp-code').value.trim();
  const name=document.getElementById('fp-name').value.trim();
  let cat=document.getElementById('fp-cat').value;
  const stock=parseInt(document.getElementById('fp-stock').value)||0;
  const minStock=parseInt(document.getElementById('fp-min').value)||5;
  const unit=document.getElementById('fp-unit').value.trim()||'u';
  if(cat==='__new__'){
    cat=document.getElementById('fp-cat-new').value.trim();
    if(!cat){toast('Ingresá el nombre de la nueva categoría','err');return;}
    if(!DB.categories.find(c=>c.name===cat)){
      try{ const [nc]=await sbInsert('categories',{name:cat}); DB.categories.push(nc); }catch(e){ toast('Error al crear categoría','err');return; }
    }
  }
  if(!code||!name){toast('Completá los campos requeridos','err');return;}
  const dup=DB.products.find(pr=>pr.code.toLowerCase()===code.toLowerCase()&&pr.id!==id);
  if(dup){toast(`Código ya existe: "${dup.name}"`,'err');return;}
  try{
    const body={code,name,category:cat,stock,min_stock:minStock,unit};
    if(id){
      const [res]=await sbUpdate('products',id,body);
      const idx=DB.products.findIndex(p=>p.id===id);
      if(idx>=0) DB.products[idx]=res||{...DB.products[idx],...body};
    }else{
      const [res]=await sbInsert('products',body);
      DB.products.push(res);
    }
    closeOverlay(); toast(id?'Producto actualizado':'Producto creado'); navigate('products');
  }catch(e){ toast('Error: '+e.message,'err'); }
}
async function deleteProduct(id){
  if(!confirm('¿Eliminar este producto?')) return;
  try{
    await sbDelete('products',id);
    DB.products=DB.products.filter(p=>p.id!==id);
    toast('Producto eliminado'); navigate('products');
  }catch(e){ toast('Error: '+e.message,'err'); }
}

    </div>`;

async function renameCategory(id,i){
  const oldName=DB.categories[i].name;
  const newName=document.getElementById('catEdit'+i).value.trim();
  if(!newName){toast('El nombre no puede estar vacío','err');return;}
  if(newName===oldName) return;
  if(DB.categories.find(c=>c.name===newName)){toast('Ya existe esa categoría','err');return;}
  try{
    await sbUpdate('categories',id,{name:newName});
    // update products locally and in DB
    const prods=DB.products.filter(p=>p.category===oldName);
    for(const p of prods){ await sbUpdate('products',p.id,{category:newName}); p.category=newName; }
    DB.categories[i].name=newName;
    toast('Categoría actualizada'); renderCategoryManagerList();
  }catch(e){ toast('Error: '+e.message,'err'); }
}
async function removeCategory(id,i){
  const name=DB.categories[i].name;
  const count=DB.products.filter(p=>p.category===name).length;
  if(count>0){toast(`No se puede eliminar: ${count} producto(s) la usan`,'err');return;}
  if(!confirm(`¿Eliminar la categoría "${name}"?`)) return;
  try{
    await sbDelete('categories',id);
    DB.categories.splice(i,1);
    toast('Categoría eliminada'); renderCategoryManagerList();
  }catch(e){ toast('Error: '+e.message,'err'); }
}
async function addCategory(){
  const input=document.getElementById('newCatInput');
  const name=input.value.trim();
  if(!name){toast('Ingresá un nombre','err');return;}
  if(DB.categories.find(c=>c.name===name)){toast('Ya existe esa categoría','err');return;}
  try{
    const [nc]=await sbInsert('categories',{name});
    DB.categories.push(nc); input.value='';
    toast('Categoría agregada'); renderCategoryManagerList();
  }catch(e){ toast('Error: '+e.message,'err'); }
}

// ── USUARIOS ─────────────────────────────────────────────────────
function renderUsers(el){
  el.innerHTML=`
    <div class="section-header">
      <div class="section-title">Usuarios</div>
      <button class="btn-sm accent" onclick="openUserForm()">${I.plus} Nuevo</button>
    </div>
    <div class="table-wrap"><div class="tbl-scroll"><table>
      <thead><tr><th>Usuario</th><th>Rol</th><th>Movimientos</th><th></th></tr></thead><tbody>
      ${DB.users.map(u=>{
        const count=DB.movements.filter(m=>m.user_id===u.id).length;
        return`<tr>
          <td><div style="display:flex;align-items:center;gap:9px">
            <div style="width:30px;height:30px;border-radius:50%;background:${u.color}22;color:${u.color};display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;flex-shrink:0">${u.initials}</div>
            <span>${u.name}</span></div></td>
          <td><span class="role-badge ${u.role==='admin'?'role-admin':'role-user'}">${u.role==='admin'?'Admin':'Usuario'}</span></td>
          <td style="color:var(--text2)">${count}</td>
          <td><div class="action-btns">
            <button class="icon-btn" onclick="openUserForm('${u.id}')">${I.edit}</button>
            ${u.id!==currentUser.id?`<button class="icon-btn del" onclick="deleteUser('${u.id}')">${I.trash}</button>`:''}
          </div></td>
        </tr>`;
      }).join('')}
      </tbody></table></div></div>`;
}
function openUserForm(id){
  const u=id?DB.users.find(x=>x.id===id):null;
  const colors=['#0ea5e9','#8b5cf6','#10b981','#f59e0b','#ef4444','#ec4899','#14b8a6','#f97316'];
  const selColor=u?.color||colors[0];
  document.getElementById('overlayContainer').innerHTML=`<div class="overlay" onclick="if(event.target===this)closeOverlay()">
    <div class="panel">
      <div class="panel-title">${u?'Editar':'Nuevo'} usuario <button class="icon-btn" onclick="closeOverlay()">${I.x}</button></div>
      <div class="form-row"><label>Nombre completo</label><input id="fu-name" placeholder="Nombre Apellido" value="${u?u.name:''}"></div>
      <div class="form-row"><label>Iniciales (2 letras)</label><input id="fu-ini" placeholder="AB" maxlength="2" value="${u?u.initials:''}" style="text-transform:uppercase"></div>
      <div class="form-row"><label>Rol</label>
        <select id="fu-role">
          <option value="user" ${u?.role==='user'?'selected':''}>Usuario operador</option>
          <option value="admin" ${u?.role==='admin'?'selected':''}>Administrador</option>
        </select>
      </div>
      <div class="form-row"><label>Contraseña</label>
        <div style="display:flex;gap:8px">
          <input type="password" id="fu-pwd" placeholder="Contraseña" value="${u?u.password:'1234'}" style="flex:1;font-family:monospace" maxlength="30">
          <button class="icon-btn" onclick="const f=document.getElementById('fu-pwd');f.type=f.type==='password'?'text':'password'">${I.search}</button>
        </div>
        <div style="font-size:11px;color:var(--text3);margin-top:5px">La contraseña por defecto es 1234</div>
      </div>
      <div class="form-row"><label>Color de avatar</label>
        <div style="display:flex;gap:8px;flex-wrap:wrap;margin-top:4px" id="colorPicker">
          ${colors.map(c=>`<div onclick="selectColor('${c}')" data-color="${c}" style="width:28px;height:28px;border-radius:50%;background:${c};cursor:pointer;border:3px solid ${selColor===c?'#fff':'transparent'};transition:border .12s"></div>`).join('')}
        </div>
        <input type="hidden" id="fu-color" value="${selColor}">
      </div>
      <div class="form-actions">
        <button class="btn-sm" onclick="closeOverlay()">Cancelar</button>
        <button class="btn-sm accent" onclick="saveUser('${id||''}')">${I.check} Guardar</button>
      </div>
    </div>
  </div>`;
}
function selectColor(c){
  document.getElementById('fu-color').value=c;
  document.querySelectorAll('#colorPicker div[data-color]').forEach(d=>{d.style.border=d.dataset.color===c?'3px solid #fff':'3px solid transparent';});
}
async function saveUser(id){
  const name=document.getElementById('fu-name').value.trim();
  const initials=document.getElementById('fu-ini').value.trim().toUpperCase();
  const role=document.getElementById('fu-role').value;
  const color=document.getElementById('fu-color').value;
  const password=document.getElementById('fu-pwd').value.trim()||'1234';
  if(!name||!initials){toast('Completá nombre e iniciales','err');return;}
  try{
    const body={name,initials,role,color,password};
    if(id){
      const [res]=await sbUpdate('app_users',id,body);
      const idx=DB.users.findIndex(u=>u.id===id);
      if(idx>=0) DB.users[idx]=res||{...DB.users[idx],...body};
      toast('Usuario actualizado');
    }else{
      const [res]=await sbInsert('app_users',body);
      DB.users.push(res);
      toast('Usuario creado');
    }
    closeOverlay(); navigate('users');
  }catch(e){ toast('Error: '+e.message,'err'); }
}
async function deleteUser(id){
  if(!confirm('¿Eliminar este usuario?')) return;
  try{
    await sbDelete('app_users',id);
    DB.users=DB.users.filter(u=>u.id!==id);
    toast('Usuario eliminado'); navigate('users');
  }catch(e){ toast('Error: '+e.message,'err'); }
}

// ── EXPORT ───────────────────────────────────────────────────────
function renderExport(el){
  el.innerHTML=`
    <div class="section-header"><div class="section-title">Exportar datos</div></div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:1rem;margin-bottom:1.25rem">
      <div class="table-wrap" style="padding:18px">
        <div style="font-size:13px;font-weight:500;margin-bottom:4px;color:var(--success)">Movimientos</div>
        <div style="font-size:12px;color:var(--text3);margin-bottom:14px">Código · Producto · Fecha · Tipo · Usuario</div>
        <div style="display:flex;gap:7px;flex-wrap:wrap">
          <button class="btn-sm success" onclick="exportCSV('movements')">${I.download} CSV</button>
          <button class="btn-sm" onclick="exportCSV('movements_json')">JSON</button>
        </div>
      </div>
      <div class="table-wrap" style="padding:18px">
        <div style="font-size:13px;font-weight:500;margin-bottom:4px;color:var(--accent)">Inventario</div>
        <div style="font-size:12px;color:var(--text3);margin-bottom:14px">Código · Nombre · Categoría · Stock</div>
        <button class="btn-sm success" onclick="exportCSV('products')">${I.download} CSV</button>
      </div>
    </div>
    <div class="section-header"><div class="section-title" style="font-size:13px">Vista previa movimientos</div></div>
    <div class="table-wrap"><div class="tbl-scroll"><table><thead><tr><th>Código</th><th>Producto</th><th>Fecha</th><th>Tipo</th><th>Cant.</th><th>Usuario</th></tr></thead><tbody>
    ${DB.movements.slice(0,10).map(m=>`<tr>
      <td style="font-family:monospace;font-size:11px;color:var(--accent);white-space:nowrap">${m.product_code}</td>
      <td>${m.product_name}</td>
      <td style="color:var(--text3);white-space:nowrap">${m.date}</td>
      <td><span class="pill ${m.type==='Entrada'?'pill-in':'pill-out'}">${m.type}</span></td>
      <td>${m.qty}</td>
      <td style="white-space:nowrap">${m.user_name}</td>
    </tr>`).join('')}
    </tbody></table></div></div>`;
}
function exportCSV(type){
  let csv='',filename='';
  if(type==='movements'){
    csv='Codigo,Producto,Fecha,Tipo,Cantidad,Usuario\n'+DB.movements.map(m=>`${m.product_code},${m.product_name},${m.date},${m.type},${m.qty},${m.user_name}`).join('\n');
    filename='movimientos_stock.csv';
  }else if(type==='products'){
    csv='Codigo,Nombre,Categoria,Stock,Unidad,StockMinimo\n'+DB.products.map(p=>`${p.code},${p.name},${p.category},${p.stock},${p.unit},${p.min_stock}`).join('\n');
    filename='inventario_productos.csv';
  }else if(type==='movements_json'){
    const b=new Blob([JSON.stringify(DB.movements,null,2)],{type:'application/json'});
    const a=document.createElement('a');a.href=URL.createObjectURL(b);a.download='movimientos.json';a.click();
    toast('JSON exportado');return;
  }
  const b=new Blob(['\ufeff'+csv],{type:'text/csv;charset=utf-8'});
  const a=document.createElement('a');a.href=URL.createObjectURL(b);a.download=filename;a.click();
  toast('CSV exportado');
}

// ── INIT ─────────────────────────────────────────────────────────
loadAll();
</script>
</body>
</html>
